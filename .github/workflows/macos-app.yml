name: macOS App

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  schedule:
    # 02:00 Asia/Shanghai (UTC+8).
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Build mode"
        required: true
        default: "ci"
        type: choice
        options:
          - ci
          - nightly
      runner:
        description: "Runner to use for manual CI builds"
        required: true
        default: "github-hosted"
        type: choice
        options:
          - github-hosted
          - self-hosted

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: macos-app-${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'nightly')) && 'nightly' || github.ref }}
  # Release-capable runs are state machines and must finish or queue behind an
  # earlier run. Ordinary branch and PR validation may be superseded.
  cancel-in-progress: ${{ !(startsWith(github.ref, 'refs/tags/') || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'nightly')) }}

jobs:
  build:
    name: Build and test EasyTier
    runs-on: ${{ (github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.runner == 'self-hosted' || inputs.mode == 'nightly'))) && fromJSON('["self-hosted","macOS","ARM64","easytier-macos"]') || 'macos-14' }}
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
    outputs:
      app_version: ${{ steps.context.outputs.app_version }}
      build_number: ${{ steps.context.outputs.build_number }}
      build_time: ${{ steps.context.outputs.build_time }}
      core_revision: ${{ steps.context.outputs.core_revision }}
      core_version: ${{ steps.context.outputs.core_version }}
      gui_revision: ${{ steps.context.outputs.gui_revision }}
      release_channel: ${{ steps.context.outputs.release_channel }}
      should_publish: ${{ steps.context.outputs.should_publish }}
      tag_name: ${{ steps.context.outputs.tag_name }}
    env:
      EASYTIER_BUILD_CONFIGURATION: release
      EASYTIER_ARTIFACTS_DIR: ${{ github.workspace }}/.build/artifacts
      EASYTIER_EXPORT_APP_DIR: ${{ github.workspace }}/.build/artifacts/EasyTier.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Resolve build context
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          NIGHTLY_RELEASES_ENABLED: ${{ vars.NIGHTLY_RELEASES_ENABLED }}
          UPDATE_BASE_URL: https://socoldkiller.github.io/easytier-macos
        run: |
          set -euo pipefail

          release_channel=none
          should_publish=false
          app_version=""
          build_number=""
          build_time=""
          tag_name=""
          gui_revision="$(git rev-parse HEAD)"
          core_revision="$(git -C Vendor/EasyTier rev-parse HEAD)"
          core_version="$(git -C Vendor/EasyTier describe --tags --always)"

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            release_channel=stable
            should_publish=true
            tag_name="$GITHUB_REF_NAME"
            app_version="${GITHUB_REF_NAME#v}"
          elif [[ "$GITHUB_EVENT_NAME" == schedule || ( "$GITHUB_EVENT_NAME" == workflow_dispatch && "${{ inputs.mode }}" == nightly ) ]]; then
            release_channel=nightly

            git -C Vendor/EasyTier fetch --no-tags origin main
            core_revision="$(git -C Vendor/EasyTier rev-parse FETCH_HEAD)"
            git -C Vendor/EasyTier checkout --detach "$core_revision"
            core_version="$(git -C Vendor/EasyTier describe --tags --always)"

            stable_tag="$(
              git for-each-ref --merged=HEAD --sort=-creatordate --format='%(refname:short)' refs/tags \
                | grep -E '^v[0-9]+(\.[0-9]+){1,2}$' \
                | head -n 1 \
                || true
            )"
            [[ -n "$stable_tag" ]] || {
              echo "Nightly requires a reachable numeric Stable tag." >&2
              exit 1
            }
            app_version="${stable_tag#v}"
            [[ "$app_version" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]

            run_created_at="$(
              curl -fsSL \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
                | python3 -c 'import json, sys; print(json.load(sys.stdin)["created_at"])'
            )"
            build_values="$(python3 - "$run_created_at" <<'PY'
          from datetime import datetime, timezone
          import sys

          value = datetime.fromisoformat(sys.argv[1].replace("Z", "+00:00")).astimezone(timezone.utc)
          print(value.strftime("%Y-%m-%dT%H:%M:%SZ"), value.strftime("%Y%m%d%H%M%S"))
          PY
            )"
            build_time="${build_values%% *}"
            build_number="${build_values##* }"
            tag_name="nightly-$build_number"

            sources_changed=true
            source_state_available=true
            current_nightly="$RUNNER_TEMP/current-nightly.json"
            if curl -fsSL -H 'Cache-Control: no-cache' \
              "$UPDATE_BASE_URL/nightly.json?source=$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" \
              -o "$current_nightly"; then
              if comparison="$(python3 - "$current_nightly" "$gui_revision" "$core_revision" <<'PY'
          import json
          import pathlib
          import sys

          manifest = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          same_sources = manifest.get("guiCommit") == sys.argv[2] and manifest.get("coreCommit") == sys.argv[3]
          print("same" if same_sources else "changed")
          PY
              )"; then
                [[ "$comparison" == same ]] && sources_changed=false
              else
                source_state_available=false
                echo "Could not validate nightly.json; this run will test but not publish." >&2
              fi
            else
              current_appcast="$RUNNER_TEMP/current-appcast.xml"
              if curl -fsSL -H 'Cache-Control: no-cache' \
                "$UPDATE_BASE_URL/appcast.xml?source=$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" \
                -o "$current_appcast"; then
                if grep -q '<sparkle:channel>nightly</sparkle:channel>' "$current_appcast"; then
                  source_state_available=false
                  echo "nightly.json is unavailable for an existing Nightly channel; this run will test but not publish." >&2
                fi
              else
                source_state_available=false
                echo "The deployed update state is unavailable; this run will test but not publish." >&2
              fi
            fi

            if [[ "$source_state_available" == false ]]; then
                sources_changed=false
            fi

            publish_enabled=false
            if [[ "$GITHUB_EVENT_NAME" == workflow_dispatch || "$NIGHTLY_RELEASES_ENABLED" == true ]]; then
              publish_enabled=true
            fi
            if [[ "$publish_enabled" == true && "$source_state_available" == true && "$sources_changed" == true ]]; then
              should_publish=true
            fi

            {
              printf 'EASYTIER_RELEASE_CHANNEL=nightly\n'
              printf 'EASYTIER_APP_VERSION=%s\n' "$app_version"
              printf 'EASYTIER_BUILD_NUMBER=%s\n' "$build_number"
              printf 'EASYTIER_BUILD_TIME=%s\n' "$build_time"
              printf 'EASYTIER_GUI_REVISION=%s\n' "$gui_revision"
              printf 'EASYTIER_CORE_REVISION=%s\n' "$core_revision"
              printf 'EASYTIER_CORE_VERSION=%s\n' "$core_version"
            } >> "$GITHUB_ENV"
          fi

          {
            printf 'release_channel=%s\n' "$release_channel"
            printf 'should_publish=%s\n' "$should_publish"
            printf 'app_version=%s\n' "$app_version"
            printf 'build_number=%s\n' "$build_number"
            printf 'build_time=%s\n' "$build_time"
            printf 'tag_name=%s\n' "$tag_name"
            printf 'gui_revision=%s\n' "$gui_revision"
            printf 'core_revision=%s\n' "$core_revision"
            printf 'core_version=%s\n' "$core_version"
          } >> "$GITHUB_OUTPUT"

      - name: Install native build dependencies
        run: brew install protobuf

      - name: Select Xcode 16
        env:
          EASYTIER_RUNNER_KIND: ${{ (github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.runner == 'self-hosted' || inputs.mode == 'nightly'))) && 'self-hosted' || 'github-hosted' }}
        run: |
          XCODE_APP="$(python3 - <<'PY'
          import glob
          import os
          import re

          def version(path):
              match = re.search(r'Xcode_(\d+(?:\.\d+)*)\.app$', path)
              if not match:
                  return ()
              return tuple(int(part) for part in match.group(1).split('.'))

          candidates = glob.glob('/Applications/Xcode_16*.app')
          if candidates:
              print(max(candidates, key=version))
          elif os.path.isdir('/Applications/Xcode.app'):
              print('/Applications/Xcode.app')
          PY
          )"
          if [[ -z "$XCODE_APP" ]]; then
            echo "Xcode 16 is required but was not found." >&2
            exit 1
          fi
          TARGET_DEVELOPER_DIR="$XCODE_APP/Contents/Developer"
          CURRENT_DEVELOPER_DIR="$(xcode-select -p 2>/dev/null || true)"
          if [[ "$CURRENT_DEVELOPER_DIR" != "$TARGET_DEVELOPER_DIR" ]]; then
            if [[ "$EASYTIER_RUNNER_KIND" == "self-hosted" ]] && ! sudo -n true 2>/dev/null; then
              cat >&2 <<EOF
          Self-hosted runner must select Xcode before running this workflow:

            sudo xcode-select -s "$TARGET_DEVELOPER_DIR"

          EOF
              exit 1
            fi
            sudo xcode-select -s "$TARGET_DEVELOPER_DIR"
          fi
          xcodebuild -version
          swift --version

      - name: Bootstrap toolchain
        run: make bootstrap

      - name: Build EasyTier FFI
        run: make ffi

      - name: Run automated tests
        run: make test

      - name: Import Developer ID certificate
        if: steps.context.outputs.should_publish == 'true'
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}

      - name: Run signed Data Protection Keychain integration test
        if: steps.context.outputs.should_publish == 'true'
        env:
          EASYTIER_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_DEVELOPER_ID_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_PROVISIONING_PROFILE_BASE64 }}
          EASYTIER_SWIFT_BUILD_DIR: ${{ github.workspace }}/.build/keychain-integration
        run: ./scripts/test-keychain-integration.sh

      - name: Build signed and notarized release artifact
        if: steps.context.outputs.should_publish == 'true'
        env:
          EASYTIER_APP_PRODUCTS_DIR: ${{ secrets.EASYTIER_APP_PRODUCTS_DIR || format('{0}/EasyTierAppProducts', runner.temp) }}
          EASYTIER_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          EASYTIER_SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
          APPLE_DEVELOPER_ID_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_PROVISIONING_PROFILE_BASE64 }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: ./scripts/release.sh artifact

      - name: Upload release artifact
        if: steps.context.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: EasyTier-macOS-${{ steps.context.outputs.release_channel }}-ARM64
          path: |
            .build/artifacts/*.dmg
            .build/artifacts/*.metadata.json
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release and Sparkle feeds
    if: needs.build.outputs.should_publish == 'true'
    needs: build
    runs-on: [self-hosted, macOS, ARM64, easytier-macos]
    timeout-minutes: 45
    concurrency:
      group: easytier-update-feed-publish
      cancel-in-progress: false
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      EASYTIER_ARTIFACTS_DIR: ${{ github.workspace }}/.build/release-artifacts
      EASYTIER_PAGES_DIR: ${{ github.workspace }}/.build/pages
      EASYTIER_RELEASE_CHANNEL: ${{ needs.build.outputs.release_channel }}
      EASYTIER_APP_VERSION: ${{ needs.build.outputs.app_version }}
      EASYTIER_BUILD_NUMBER: ${{ needs.build.outputs.build_number }}
      EASYTIER_BUILD_TIME: ${{ needs.build.outputs.build_time }}
      EASYTIER_GUI_REVISION: ${{ needs.build.outputs.gui_revision }}
      EASYTIER_CORE_REVISION: ${{ needs.build.outputs.core_revision }}
      EASYTIER_CORE_VERSION: ${{ needs.build.outputs.core_version }}
      EASYTIER_ALLOW_MISSING_CHANNEL_FEED: ${{ needs.build.outputs.release_channel == 'nightly' && '1' || '0' }}
      EASYTIER_ALLOW_MISSING_CURRENT_FEED: ${{ needs.build.outputs.tag_name == 'v1.4.0' && '1' || '0' }}

    steps:
      - name: Checkout release module
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.build.outputs.gui_revision }}

      - name: Prepare release artifact directory
        run: rm -rf .build/release-artifacts .build/pages

      - name: Download notarized DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: EasyTier-macOS-${{ needs.build.outputs.release_channel }}-ARM64
          path: .build/release-artifacts

      - name: Ensure GitHub CLI
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            brew install gh
          fi

      - name: Verify artifact, publish release, and generate signed feeds
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.build.outputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: ./scripts/release.sh publish

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Pages artifact dependencies
        run: |
          if ! command -v gtar >/dev/null 2>&1; then
            brew install gnu-tar
          fi

      - name: Upload update feed page artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .build/pages

      - name: Deploy update feed to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed update feeds
        run: ./scripts/release.sh verify-deployed-feeds

      - name: Prune expired Nightly releases
        if: needs.build.outputs.release_channel == 'nightly'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          EASYTIER_NIGHTLY_RELEASES_TO_KEEP: 14
        run: ./scripts/release.sh prune-nightlies
