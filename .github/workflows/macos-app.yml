name: macOS App

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner to use for manual builds"
        required: true
        default: "github-hosted"
        type: choice
        options:
          - github-hosted
          - self-hosted

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: macos-app-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test EasyTier
    # Release-capable builds stay on ARM64 so the published appcast always
    # describes the single Apple-silicon artifact supported by this release.
    runs-on: ${{ ((github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted') || github.event_name == 'push') && fromJSON('["self-hosted","macOS","ARM64","easytier-macos"]') || 'macos-14' }}
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      EASYTIER_BUILD_CONFIGURATION: release
      EASYTIER_EXPORT_APP_DIR: ${{ github.workspace }}/.build/artifacts/EasyTier.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install native build dependencies
        run: brew install protobuf

      - name: Select Xcode 16
        env:
          EASYTIER_RUNNER_KIND: ${{ ((github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted') || github.event_name == 'push') && 'self-hosted' || 'github-hosted' }}
        run: |
          XCODE_APP="$(python3 - <<'PY'
          import glob
          import os
          import re

          def version(path):
              match = re.search(r'Xcode_(\d+(?:\.\d+)*)\.app$', path)
              if not match:
                  return ()
              return tuple(int(part) for part in match.group(1).split('.'))

          candidates = glob.glob('/Applications/Xcode_16*.app')
          if candidates:
              print(max(candidates, key=version))
          elif os.path.isdir('/Applications/Xcode.app'):
              print('/Applications/Xcode.app')
          PY
          )"
          if [[ -z "$XCODE_APP" ]]; then
            echo "Xcode 16 is required but was not found." >&2
            exit 1
          fi
          TARGET_DEVELOPER_DIR="$XCODE_APP/Contents/Developer"
          CURRENT_DEVELOPER_DIR="$(xcode-select -p 2>/dev/null || true)"
          if [[ "$CURRENT_DEVELOPER_DIR" != "$TARGET_DEVELOPER_DIR" ]]; then
            if [[ "$EASYTIER_RUNNER_KIND" == "self-hosted" ]] && ! sudo -n true 2>/dev/null; then
              cat >&2 <<EOF
          Self-hosted runner must select Xcode before running this workflow:

            sudo xcode-select -s "$TARGET_DEVELOPER_DIR"

          EOF
              exit 1
            fi
            sudo xcode-select -s "$TARGET_DEVELOPER_DIR"
          fi
          xcodebuild -version
          swift --version

      - name: Bootstrap toolchain
        run: make bootstrap

      - name: Build EasyTier FFI
        run: make ffi

      - name: Run automated tests
        run: make test

      - name: Require release signing credentials
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          missing=()
          for name in \
            APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 \
            APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD \
            APPLE_KEYCHAIN_PASSWORD \
            APPLE_CODESIGN_IDENTITY \
            APPLE_NOTARY_KEY \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_ISSUER_ID \
            SPARKLE_PUBLIC_ED_KEY
          do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if [[ "${#missing[@]}" -ne 0 ]]; then
            printf 'Tag releases require Developer ID signing, Apple notarization, and a Sparkle public key. Missing values: %s\n' \
              "${missing[*]}" >&2
            exit 1
          fi

          echo "Tag release will use Developer ID signing and Apple notarization."

      - name: Import Developer ID certificate
        if: startsWith(github.ref, 'refs/tags/')
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}

      - name: Package app
        if: startsWith(github.ref, 'refs/tags/')
        env:
          EASYTIER_APP_PRODUCTS_DIR: ${{ secrets.EASYTIER_APP_PRODUCTS_DIR || format('{0}/EasyTierAppProducts', runner.temp) }}
          EASYTIER_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          EASYTIER_SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          rm -rf .build/artifacts
          mkdir -p .build/artifacts
          ./scripts/package-app.sh

      - name: Notarize release app
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          if [[ -z "$APPLE_NOTARY_KEY" || -z "$APPLE_NOTARY_KEY_ID" || -z "$APPLE_NOTARY_ISSUER_ID" ]]; then
            echo "Apple notarization secrets are required for tag releases." >&2
            exit 1
          fi

          umask 077
          mkdir -p .build/artifacts "$RUNNER_TEMP/notary"
          NOTARY_KEY_PATH="$RUNNER_TEMP/notary/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          NOTARY_ZIP_PATH="$RUNNER_TEMP/notary/EasyTier-app.zip"
          NOTARY_RESULT_PATH="$RUNNER_TEMP/notary/EasyTier-app-result.json"
          printf '%s' "$APPLE_NOTARY_KEY" > "$NOTARY_KEY_PATH"
          ditto -c -k --keepParent --sequesterRsrc --zlibCompressionLevel 9 \
            "$EASYTIER_EXPORT_APP_DIR" \
            "$NOTARY_ZIP_PATH"
          xcrun notarytool submit "$NOTARY_ZIP_PATH" \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait \
            --output-format json > "$NOTARY_RESULT_PATH"
          cat "$NOTARY_RESULT_PATH"
          python3 - "$NOTARY_RESULT_PATH" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              result = json.load(handle)
          if result.get("status") != "Accepted":
              print(f"App notarization was not accepted: {result}", file=sys.stderr)
              sys.exit(1)
          PY
          xcrun stapler staple "$EASYTIER_EXPORT_APP_DIR"
          xcrun stapler validate "$EASYTIER_EXPORT_APP_DIR"
          codesign --verify --deep --strict --verbose=2 "$EASYTIER_EXPORT_APP_DIR"
          spctl -a -vvv -t exec "$EASYTIER_EXPORT_APP_DIR"

      - name: Create DMG from packaged app
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p .build/artifacts
          rm -f \
            .build/artifacts/*.dmg \
            .build/artifacts/*.metadata.json
          ./scripts/create-dmg.sh \
            "$EASYTIER_EXPORT_APP_DIR" \
            ".build/artifacts/EasyTier-macOS-${{ runner.arch }}.dmg"

      - name: Notarize and validate release DMG
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          DMG_PATH=".build/artifacts/EasyTier-macOS-${{ runner.arch }}.dmg"
          NOTARY_KEY_PATH="$RUNNER_TEMP/notary/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          NOTARY_RESULT_PATH="$RUNNER_TEMP/notary/EasyTier-dmg-result.json"
          if [[ ! -s "$NOTARY_KEY_PATH" ]]; then
            echo "App Store Connect API key is unavailable for DMG notarization." >&2
            exit 1
          fi

          xcrun notarytool submit "$DMG_PATH" \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait \
            --output-format json > "$NOTARY_RESULT_PATH"
          cat "$NOTARY_RESULT_PATH"
          python3 - "$NOTARY_RESULT_PATH" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              result = json.load(handle)
          if result.get("status") != "Accepted":
              print(f"DMG notarization was not accepted: {result}", file=sys.stderr)
              sys.exit(1)
          PY
          xcrun stapler staple "$DMG_PATH"
          ./scripts/verify-release-dmg.sh "$DMG_PATH"

      - name: Write artifact metadata
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          BUNDLE_SHORT_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$EASYTIER_EXPORT_APP_DIR/Contents/Info.plist")"
          BUNDLE_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$EASYTIER_EXPORT_APP_DIR/Contents/Info.plist")"
          cat > ".build/artifacts/EasyTier-macOS-${{ runner.arch }}.metadata.json" <<EOF
          {
            "architecture": "${{ runner.arch }}",
            "version": "$BUNDLE_SHORT_VERSION",
            "build": "$BUNDLE_VERSION",
            "signing": "developer-id",
            "notarized": true
          }
          EOF

          # Only upload the DMG and metadata. Uploading the loose .app directory
          # makes artifact installs ambiguous and can leave
          # ServiceManagement records pointing at the Downloads extraction path.
          rm -rf "$EASYTIER_EXPORT_APP_DIR"

      - name: Remove temporary notarization credentials
        if: always() && startsWith(github.ref, 'refs/tags/')
        run: rm -rf "$RUNNER_TEMP/notary"

      - name: Upload DMG artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: EasyTier-macOS-${{ runner.arch }}
          path: |
            .build/artifacts/*.dmg
            .build/artifacts/*.metadata.json
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: [self-hosted, macOS, ARM64, easytier-macos]
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout release verification scripts
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Require Sparkle feed signing credential
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          if [[ -z "$SPARKLE_EDDSA_PRIVATE_KEY" ]]; then
            echo "The github-pages environment or repository must provide SPARKLE_EDDSA_PRIVATE_KEY." >&2
            exit 1
          fi

      - name: Prepare release artifact directory
        run: rm -rf .build/release-artifacts

      - name: Download notarized DMG artifact
        uses: actions/download-artifact@v4
        with:
          pattern: EasyTier-macOS-*
          path: .build/release-artifacts
          merge-multiple: true

      - name: Validate notarized release asset
        run: |
          shopt -s nullglob
          dmg_files=(.build/release-artifacts/*.dmg)
          metadata_files=(.build/release-artifacts/*.metadata.json)
          if [[ "${#dmg_files[@]}" -ne 1 || "${#metadata_files[@]}" -ne 1 ]]; then
            printf 'Expected one DMG and one metadata file; found %s DMG(s) and %s metadata file(s).\n' \
              "${#dmg_files[@]}" "${#metadata_files[@]}" >&2
            exit 1
          fi

          python3 - "${metadata_files[0]}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              metadata = json.load(handle)
          if metadata.get("signing") != "developer-id" or metadata.get("notarized") is not True:
              print(f"Refusing to publish an unsigned or unnotarized release: {metadata}", file=sys.stderr)
              sys.exit(1)
          if metadata.get("architecture") != "ARM64":
              print(f"Refusing to publish a non-ARM64 release: {metadata}", file=sys.stderr)
              sys.exit(1)
          PY
          ./scripts/verify-release-dmg.sh "${dmg_files[0]}"

      - name: Validate Sparkle build ordering
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          metadata_path="$(find .build/release-artifacts -maxdepth 1 -name '*.metadata.json' -print -quit)"
          current_feed="$RUNNER_TEMP/current-update.json"
          ordering_cache_bust="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          if ! curl -fsSL -H 'Cache-Control: no-cache' "https://socoldkiller.github.io/easytier-macos/update.json?ordering=$ordering_cache_bust" -o "$current_feed"; then
            echo "Could not load the existing update feed for monotonic build validation." >&2
            exit 1
          fi

          python3 - "$metadata_path" "$current_feed" "$TAG_NAME" <<'PY'
          import json
          import sys

          metadata_path, feed_path, tag = sys.argv[1:]
          with open(metadata_path, "r", encoding="utf-8") as handle:
              metadata = json.load(handle)
          with open(feed_path, "r", encoding="utf-8") as handle:
              current = json.load(handle)

          new_build = int(str(metadata["build"]))
          current_build = int(str(current["build"]))
          current_tag = str(current.get("tag", ""))
          if current_tag == tag:
              if new_build != current_build:
                  raise SystemExit(
                      f"A rerun of {tag} changed CFBundleVersion: {new_build} != {current_build}"
                  )
          elif new_build <= current_build:
              raise SystemExit(
                  f"New CFBundleVersion must exceed the published build: {new_build} <= {current_build}"
              )
          PY

      - name: Ensure GitHub CLI
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            brew install gh
          fi

      - name: Publish GitHub Release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          NOTES_PATH=".build/release-artifacts/RELEASE_NOTES.md"
          shopt -s nullglob
          dmg_files=(.build/release-artifacts/*.dmg)
          metadata_files=(.build/release-artifacts/*.metadata.json)
          if [[ "${#dmg_files[@]}" -ne 1 || "${#metadata_files[@]}" -ne 1 ]]; then
            printf 'Expected one DMG and one metadata file; found %s DMG(s) and %s metadata file(s).\n' \
              "${#dmg_files[@]}" "${#metadata_files[@]}" >&2
            exit 1
          fi

          python3 - "$TAG_NAME" "$NOTES_PATH" <<'PY'
          import pathlib
          import sys

          tag, output_path = sys.argv[1:]
          version = tag[1:] if tag.startswith(("v", "V")) else tag
          lines = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          heading = f"## [{version}]"
          start = next((index for index, line in enumerate(lines) if line.startswith(heading)), None)
          if start is None:
              raise SystemExit(f"CHANGELOG.md is missing a {heading} section")

          end = next(
              (index for index in range(start + 1, len(lines)) if lines[index].startswith("## ")),
              len(lines),
          )
          body = "\n".join(lines[start + 1:end]).strip()
          if not body:
              raise SystemExit(f"CHANGELOG.md section {heading} is empty")

          notes = (
              f"# EasyTier {version}\n\n{body}\n\n"
              "This DMG is Developer ID signed, Apple-notarized, stapled, and verified with Gatekeeper.\n"
          )
          pathlib.Path(output_path).write_text(notes, encoding="utf-8")
          PY

          release_exists=0
          if gh release view "$TAG_NAME" --repo "$REPOSITORY" >/dev/null 2>&1; then
            release_exists=1
          else
            gh release create "$TAG_NAME" --repo "$REPOSITORY" --title "$TAG_NAME" --notes-file "$NOTES_PATH"
          fi
          gh release edit "$TAG_NAME" --repo "$REPOSITORY" --notes-file "$NOTES_PATH"

          existing_dir="$RUNNER_TEMP/existing-release-asset"
          rm -rf "$existing_dir"
          mkdir -p "$existing_dir"
          asset_name="$(basename "${dmg_files[0]}")"
          if [[ "$release_exists" == "1" ]] && gh release download "$TAG_NAME" --repo "$REPOSITORY" --pattern "$asset_name" --dir "$existing_dir"; then
            cmp "${dmg_files[0]}" "$existing_dir/$asset_name" || {
              echo "Refusing to replace immutable release asset $asset_name with different bytes." >&2
              exit 1
            }
            echo "Existing release asset is byte-identical; upload skipped."
          else
            gh release upload "$TAG_NAME" "${dmg_files[0]}" --repo "$REPOSITORY"
          fi

      - name: Generate signed Sparkle and legacy update feeds
        env:
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          rm -rf .build/pages .build/appcast-input .build/sparkle-tools
          mkdir -p .build/pages .build/appcast-input

          shopt -s nullglob
          dmg_files=(.build/release-artifacts/*.dmg)
          metadata_files=(.build/release-artifacts/*.metadata.json)
          if [[ "${#dmg_files[@]}" -ne 1 || "${#metadata_files[@]}" -ne 1 ]]; then
            echo "Expected exactly one DMG and one metadata file for feed generation." >&2
            exit 1
          fi
          dmg_path="${dmg_files[0]}"
          dmg_name="$(basename "$dmg_path")"
          notes_name="${dmg_name%.dmg}.md"
          cp "$dmg_path" ".build/appcast-input/$dmg_name"
          cp .build/release-artifacts/RELEASE_NOTES.md ".build/appcast-input/$notes_name"

          XCODE_APP="$(python3 - <<'PY'
          import glob
          import os
          import re

          def version(path):
              match = re.search(r'Xcode_(\d+(?:\.\d+)*)\.app$', path)
              return tuple(int(part) for part in match.group(1).split('.')) if match else ()

          candidates = glob.glob('/Applications/Xcode_16*.app')
          if candidates:
              print(max(candidates, key=version))
          elif os.path.isdir('/Applications/Xcode.app'):
              print('/Applications/Xcode.app')
          PY
          )"
          [[ -n "$XCODE_APP" ]] || {
            echo "Xcode 16 or newer is required to resolve the pinned Sparkle tools." >&2
            exit 1
          }
          export DEVELOPER_DIR="$XCODE_APP/Contents/Developer"
          swift_version="$(swift --version)"
          printf '%s\n' "$swift_version"
          swift_major="$(printf '%s\n' "$swift_version" | sed -n 's/.*Swift version \([0-9][0-9]*\).*/\1/p' | head -n 1)"
          if [[ -z "$swift_major" || "$swift_major" -lt 6 ]]; then
            echo "Swift 6 or newer is required to resolve this package." >&2
            exit 1
          fi

          swift package resolve --scratch-path .build/sparkle-tools
          sparkle_tools=".build/sparkle-tools/artifacts/sparkle/Sparkle/bin"
          [[ -x "$sparkle_tools/generate_appcast" ]] || {
            echo "Pinned Sparkle generate_appcast tool was not resolved." >&2
            exit 1
          }

          generate_output="$(
            printf '%s' "$SPARKLE_EDDSA_PRIVATE_KEY" | \
              "$sparkle_tools/generate_appcast" \
                --ed-key-file - \
                --download-url-prefix "https://github.com/$REPOSITORY/releases/download/$TAG_NAME/" \
                --embed-release-notes \
                --maximum-versions 1 \
                -o "${{ github.workspace }}/.build/pages/appcast.xml" \
                .build/appcast-input 2>&1
          )"
          printf '%s\n' "$generate_output"
          if [[ "$generate_output" == *"does not match"* ]]; then
            echo "Sparkle private key does not match SUPublicEDKey in the packaged app." >&2
            exit 1
          fi

          python3 - <<'PY'
          import glob
          import hashlib
          import json
          import os
          import pathlib
          import sys

          tag = os.environ["TAG_NAME"]
          repository = os.environ["REPOSITORY"]
          tag_version = tag[1:] if tag.startswith(("v", "V")) else tag
          metadata_versions = []
          metadata_builds = []
          for metadata_path in sorted(glob.glob(".build/release-artifacts/*.metadata.json")):
              with open(metadata_path, "r", encoding="utf-8") as handle:
                  metadata = json.load(handle)
              if metadata.get("version"):
                  metadata_versions.append(str(metadata["version"]))
              if metadata.get("build"):
                  metadata_builds.append(str(metadata["build"]))
          version = metadata_versions[0] if metadata_versions else tag_version
          if any(item != version for item in metadata_versions):
              print(f"Release artifacts disagree on version: {metadata_versions}", file=sys.stderr)
              sys.exit(1)
          build = max(metadata_builds, key=lambda item: int(item) if item.isdigit() else 0) if metadata_builds else "0"
          arch_names = {
              "ARM64": "arm64",
              "arm64": "arm64",
              "X64": "x86_64",
              "x64": "x86_64",
              "x86_64": "x86_64",
          }
          dmg_paths = sorted(glob.glob(".build/release-artifacts/*.dmg"))
          if len(dmg_paths) != 1:
              print(f"Expected exactly one DMG asset, found {len(dmg_paths)}.", file=sys.stderr)
              sys.exit(1)

          assets = {}
          for path in dmg_paths:
              file_path = pathlib.Path(path)
              arch_token = file_path.stem.split("-")[-1]
              arch = arch_names.get(arch_token, arch_token)
              hasher = hashlib.sha256()
              with file_path.open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      hasher.update(chunk)
              assets[arch] = {
                  "url": f"https://github.com/{repository}/releases/download/{tag}/{file_path.name}",
                  "sha256": hasher.hexdigest(),
                  "size": file_path.stat().st_size,
              }

          manifest = {
              "schemaVersion": 1,
              "channel": "stable",
              "version": version,
              "build": build,
              "tag": tag,
              "minimumSystemVersion": "15.0",
              "releaseNotesURL": f"https://github.com/{repository}/releases/tag/{tag}",
              "assets": assets,
          }
          with open(".build/pages/update.json", "w", encoding="utf-8") as handle:
              json.dump(manifest, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY

          python3 - "$dmg_path" "${metadata_files[0]}" "$TAG_NAME" "$REPOSITORY" <<'PY'
          import json
          import pathlib
          import sys
          import xml.etree.ElementTree as ET

          dmg_path, metadata_path, tag, repository = sys.argv[1:]
          with open(metadata_path, "r", encoding="utf-8") as handle:
              metadata = json.load(handle)

          root = ET.parse(".build/pages/appcast.xml").getroot()
          item = root.find("./channel/item")
          if item is None:
              raise SystemExit("Generated appcast does not contain an item")
          enclosure = item.find("enclosure")
          if enclosure is None:
              raise SystemExit("Generated appcast does not contain an enclosure")

          def local_name(name):
              return name.rsplit("}", 1)[-1]

          attributes = {local_name(key): value for key, value in enclosure.attrib.items()}
          elements = {local_name(child.tag): (child.text or "").strip() for child in item}
          expected_url = f"https://github.com/{repository}/releases/download/{tag}/{pathlib.Path(dmg_path).name}"
          expected_length = str(pathlib.Path(dmg_path).stat().st_size)
          expected_version = str(metadata["build"])
          expected_short_version = str(metadata["version"])

          checks = {
              "url": (attributes.get("url"), expected_url),
              "length": (attributes.get("length"), expected_length),
              "version": (attributes.get("version") or elements.get("version"), expected_version),
              "shortVersionString": (
                  attributes.get("shortVersionString") or elements.get("shortVersionString"),
                  expected_short_version,
              ),
              "minimumSystemVersion": (elements.get("minimumSystemVersion"), "15.0"),
              "hardwareRequirements": (elements.get("hardwareRequirements"), "arm64"),
          }
          for field, (actual, expected) in checks.items():
              if actual != expected:
                  raise SystemExit(f"Appcast {field} mismatch: {actual!r} != {expected!r}")

          signature = attributes.get("edSignature")
          if not signature:
              raise SystemExit("Appcast enclosure is missing sparkle:edSignature")
          pathlib.Path(".build/release-artifacts/appcast-signature.txt").write_text(signature, encoding="utf-8")
          PY

          signature="$(cat .build/release-artifacts/appcast-signature.txt)"
          printf '%s' "$SPARKLE_EDDSA_PRIVATE_KEY" | \
            "$sparkle_tools/sign_update" --verify --ed-key-file - "$dmg_path" "$signature"
          printf '%s' "$SPARKLE_EDDSA_PRIVATE_KEY" | \
            "$sparkle_tools/sign_update" --verify --ed-key-file - .build/pages/appcast.xml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Pages artifact dependencies
        run: |
          if ! command -v gtar >/dev/null 2>&1; then
            brew install gnu-tar
          fi

      - name: Upload update feed page artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .build/pages

      - name: Deploy update feed to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed update feeds
        run: |
          deployed_appcast="$RUNNER_TEMP/deployed-appcast.xml"
          deployed_legacy="$RUNNER_TEMP/deployed-update.json"
          for attempt in {1..12}; do
            cache_bust="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            if curl -fsSL -H 'Cache-Control: no-cache' "https://socoldkiller.github.io/easytier-macos/appcast.xml?deploy=$cache_bust" -o "$deployed_appcast" && \
               curl -fsSL -H 'Cache-Control: no-cache' "https://socoldkiller.github.io/easytier-macos/update.json?deploy=$cache_bust" -o "$deployed_legacy" && \
               cmp .build/pages/appcast.xml "$deployed_appcast" && \
               cmp .build/pages/update.json "$deployed_legacy"; then
              echo "GitHub Pages is serving the newly signed update feeds."
              exit 0
            fi
            sleep 5
          done
          echo "GitHub Pages did not serve the expected update feeds within 60 seconds." >&2
          exit 1
